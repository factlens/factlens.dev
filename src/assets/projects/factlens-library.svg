  <text x="400" y="310" fill="#737373" font-family="monospace" font-size="13">    question, context, response</text>
  <text x="400" y="340" fill="#737373" font-family="monospace" font-size="13">)</text>
  <text x="400" y="390" fill="#22c55e" font-family="monospace" font-size="13">result.flagged = False</text>
