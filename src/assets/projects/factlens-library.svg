<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <text x="400" y="200" fill="#22c55e" font-family="monospace" font-size="14">$ pip install factlens</text>
  <text x="400" y="250" fill="#737373" font-family="monospace" font-size="13">from factlens import compute_sgi</text>
